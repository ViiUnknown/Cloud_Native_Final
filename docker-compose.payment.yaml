services:
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - PORT=3004
    networks:
      - foodnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  foodnet:
    driver: bridge